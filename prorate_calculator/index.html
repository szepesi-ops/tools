<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prorated Refund Calculator</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f3;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem 1rem;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      border: 0.5px solid rgba(0,0,0,0.12);
      padding: 1.5rem 1.75rem;
      max-width: 480px;
      width: 100%;
    }
    h1 {
      font-size: 16px;
      font-weight: 500;
      margin: 0 0 1.25rem;
      color: #111;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 1.25rem;
    }
    label {
      font-size: 13px;
      color: #666;
      display: block;
      margin-bottom: 6px;
    }
    .input-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .input-wrap span {
      color: #888;
      font-size: 14px;
    }
    input[type="number"],
    input[type="date"] {
      width: 100%;
      padding: 7px 10px;
      border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 8px;
      font-size: 14px;
      color: #111;
      background: #fff;
      box-sizing: border-box;
    }
    input[type="number"]:focus,
    input[type="date"]:focus {
      outline: none;
      border-color: rgba(0,0,0,0.4);
    }
    .breakdown {
      border-top: 0.5px solid rgba(0,0,0,0.1);
      padding-top: 1rem;
      margin-bottom: 1rem;
    }
    .breakdown-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }
    .breakdown-row span:last-child {
      color: #333;
    }
    .result {
      background: #f5f5f3;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .result-label {
      font-size: 14px;
      color: #666;
    }
    .result-value {
      font-size: 26px;
      font-weight: 500;
      color: #111;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Prorated refund calculator</h1>

    <div class="grid-2">
      <div>
        <label>Old plan (monthly)</label>
        <div class="input-wrap">
          <span>$</span>
          <input type="number" id="oldPlan" value="250" step="1" />
        </div>
      </div>
      <div>
        <label>New plan (monthly)</label>
        <div class="input-wrap">
          <span>$</span>
          <input type="number" id="newPlan" value="109" step="1" />
        </div>
      </div>
    </div>

    <div class="grid-2">
      <div>
        <label>Charge date</label>
        <input type="date" id="chargeDate" value="2026-04-19" />
      </div>
      <div>
        <label>Downgrade date</label>
        <input type="date" id="downgradeDate" value="2026-04-20" />
      </div>
    </div>

    <div class="breakdown">
      <div class="breakdown-row"><span>Days in billing period</span><span id="daysInPeriod">—</span></div>
      <div class="breakdown-row"><span>Days remaining (from downgrade)</span><span id="daysRemaining">—</span></div>
      <div class="breakdown-row"><span>Daily rate difference</span><span id="dailyDiff">—</span></div>
    </div>

    <div class="result">
      <span class="result-label">Prorated refund</span>
      <span class="result-value" id="refundAmount">—</span>
    </div>
  </div>

  <script>
    function calcRefund() {
      const oldPlan = parseFloat(document.getElementById('oldPlan').value) || 0;
      const newPlan = parseFloat(document.getElementById('newPlan').value) || 0;
      const chargeDate = new Date(document.getElementById('chargeDate').value);
      const downgradeDate = new Date(document.getElementById('downgradeDate').value);

      if (isNaN(chargeDate.getTime()) || isNaN(downgradeDate.getTime()) || downgradeDate < chargeDate) {
        document.getElementById('refundAmount').textContent = '—';
        document.getElementById('daysInPeriod').textContent = '—';
        document.getElementById('daysRemaining').textContent = '—';
        document.getElementById('dailyDiff').textContent = '—';
        return;
      }

      const nextBilling = new Date(chargeDate);
      nextBilling.setMonth(nextBilling.getMonth() + 1);

      const msPerDay = 1000 * 60 * 60 * 24;
      const daysInPeriod = Math.round((nextBilling - chargeDate) / msPerDay);
      const daysRemaining = Math.round((nextBilling - downgradeDate) / msPerDay);
      const diff = oldPlan - newPlan;
      const dailyDiff = diff / daysInPeriod;
      const refund = dailyDiff * daysRemaining;

      document.getElementById('daysInPeriod').textContent = daysInPeriod + ' days';
      document.getElementById('daysRemaining').textContent = daysRemaining + ' days';
      document.getElementById('dailyDiff').textContent = '$' + dailyDiff.toFixed(4) + '/day';
      document.getElementById('refundAmount').textContent = '$' + refund.toFixed(2);
    }

    document.getElementById('oldPlan').addEventListener('input', calcRefund);
    document.getElementById('newPlan').addEventListener('input', calcRefund);
    document.getElementById('chargeDate').addEventListener('change', calcRefund);
    document.getElementById('downgradeDate').addEventListener('change', calcRefund);

    calcRefund();
  </script>
</body>
</html>
